name: Deploy to GCP

on:
  # Only deploy after tests pass successfully
  workflow_run:
    workflows: ["Test Suite"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger (bypasses test requirement)

jobs:
  deploy:
    name: Build and Deploy to GCP Compute Engine
    runs-on: ubuntu-latest
    # Only run if tests passed (skip if manually triggered)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    permissions:
      contents: read

    steps:
    - name: Check test results
      if: github.event_name == 'workflow_run'
      run: |
        echo "✅ Tests passed - proceeding with deployment"
        echo "Test workflow: ${{ github.event.workflow_run.name }}"
        echo "Test conclusion: ${{ github.event.workflow_run.conclusion }}"

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build JAR
      run: mvn clean package -DskipTests -B

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Copy JAR to GCP VM
      run: |
        gcloud compute scp \
          target/primaryfeed-*.jar \
          ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_NAME }}:/home/${{ secrets.GCP_VM_USER }}/primaryfeed.jar \
          --zone=${{ secrets.GCP_VM_ZONE }} \
          --project=${{ secrets.GCP_PROJECT_ID }}

    - name: Deploy and restart application
      run: |
        gcloud compute ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_NAME }} \
          --zone=${{ secrets.GCP_VM_ZONE }} \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          --command="sudo systemctl restart primaryfeed || (pkill -f 'primaryfeed.*jar' && nohup java -jar /home/${{ secrets.GCP_VM_USER }}/primaryfeed.jar > /home/${{ secrets.GCP_VM_USER }}/app.log 2>&1 &)"

    - name: Verify deployment
      run: |
        echo "Waiting 15 seconds for application to start..."
        sleep 15
        curl -f http://${{ secrets.GCP_VM_IP }}:8080/health || echo "Health check failed - application may still be starting"

    - name: Notify deployment status
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ Deployment successful to http://${{ secrets.GCP_VM_IP }}:8080"
        else
          echo "❌ Deployment failed"
          exit 1
        fi
