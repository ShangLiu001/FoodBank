# TestContainers will override datasource properties dynamically
# No need to specify URL, username, password - TestContainers manages it

# JPA settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable SQL initialization - we'll use custom approach to load existing SQL files
spring.sql.init.mode=never

# JWT test settings
app.jwt.secret=test-secret-key-for-testing-purposes-only-must-be-at-least-256-bits
app.jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.primaryfeed=DEBUG
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN
