# Datasource - placeholders, will be overridden by @DynamicPropertySource in AbstractTestContainersTest
# These prevent fallback to main application.properties during early Hibernate initialization
spring.datasource.url=jdbc:mysql://localhost:3306/testcontainers
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Disable SQL initialization - we'll use custom approach to load existing SQL files
spring.sql.init.mode=never

# JWT test settings
app.jwt.secret=test-secret-key-for-testing-purposes-only-must-be-at-least-256-bits
app.jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.primaryfeed=DEBUG
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN
